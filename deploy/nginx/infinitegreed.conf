# Infinite Greed — RTS. Reverse-proxies the Dockerized game server (localhost:8085).
# ADDITIVE ONLY: matches the infinitegreed.* hostnames; does not touch the
# Matrix/Synapse (*.configit.com.au) vhosts on this box.
#
# This file is the HTTP (:80) stage. Run certbot --nginx once DNS for both
# domains points at this box; certbot appends the :443 server block + redirect.

# Uniquely-named map so it can never collide with a $connection_upgrade map
# that the Matrix/LiveKit vhosts may already define in the http{} context.
map $http_upgrade $ig_connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    listen [::]:80;
    server_name infinitegreed.com www.infinitegreed.com infinitegreed.de www.infinitegreed.de;

    location / {
        proxy_pass http://127.0.0.1:8085;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $ig_connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}
