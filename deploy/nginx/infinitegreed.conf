# Infinite Greed — RTS. Reverse-proxies the Dockerized game server (localhost:8085).
# ADDITIVE ONLY: matches the infinitegreed.* hostnames; does not touch the
# Matrix/Synapse (*.configit.com.au) vhosts on this box.
#
# This is the LIVE copy as it exists on the box after certbot --nginx ran for
# infinitegreed.com + www. The ".de" names are still listed on the server_name
# lines; once DNS for .de points at the box, re-run deploy/nginx-certbot.mjs and
# certbot will extend the cert to cover them (it edits the "managed by Certbot"
# lines below). Keep this file in sync with the box if you ever re-apply it.

# Uniquely-named map so it can never collide with a $connection_upgrade map
# that the Matrix/LiveKit vhosts may already define in the http{} context.
map $http_upgrade $ig_connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    server_name infinitegreed.com www.infinitegreed.com infinitegreed.de www.infinitegreed.de;

    location / {
        proxy_pass http://127.0.0.1:8085;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $ig_connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    listen 443 ssl; # managed by Certbot
    listen [::]:443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/infinitegreed.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/infinitegreed.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}


server {
    if ($host = www.infinitegreed.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    if ($host = infinitegreed.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    listen [::]:80;
    server_name infinitegreed.com www.infinitegreed.com infinitegreed.de www.infinitegreed.de;
    return 404; # managed by Certbot
}
